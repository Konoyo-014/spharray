name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev,image]"

      - name: Run tests
        run: python -m pytest -q --tb=short

      - name: Run examples
        run: |
          MPLBACKEND=Agg python examples/core/basic_usage.py
          MPLBACKEND=Agg python examples/tutorials/01_sht_and_beamforming.py
          MPLBACKEND=Agg python examples/tutorials/02_simulated_doa_pipeline.py
          MPLBACKEND=Agg python examples/tutorials/03_modal_equalization_pipeline.py

      - name: Execute notebook code cells
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          ns = {}
          nb = json.loads(Path("examples/notebooks/getting_started.ipynb").read_text())
          for i, cell in enumerate(nb["cells"]):
              if cell["cell_type"] == "code":
                  exec(compile("".join(cell["source"]), f"notebook-cell-{i}", "exec"), ns)
          PY

  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install -U pip
          python -m pip install build
          python -m build

      - name: Wheel smoke test
        run: |
          python -m pip install --force-reinstall dist/*.whl
          python - <<'PY'
          import importlib.resources as ir
          import spharray as sap
          from spharray import SHBasisSpec
          from spharray.array.sampling import fibonacci_grid
          from spharray.sh import matrix
          assert sap.__version__ == "0.3.0"
          assert ir.files("spharray").joinpath("py.typed").is_file()
          grid = fibonacci_grid(16)
          y = matrix(SHBasisSpec(max_order=1, basis="complex", angle_convention="az_colat"), grid)
          assert y.shape == (16, 4)
          print("wheel smoke ok")
          PY

      - name: Source distribution smoke test
        run: |
          tmpdir="$(mktemp -d)"
          tar -xzf dist/spharray-*.tar.gz -C "$tmpdir"
          cd "$tmpdir"/spharray-*
          python -m pip install ".[dev]"
          python -m pytest -q --tb=short
