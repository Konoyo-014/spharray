name: ci

on:
  push:
  pull_request:

jobs:
  test-build-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e ".[dev,image]"
          pip install build

      - name: Run tests
        run: pytest -q

      - name: Build wheel
        run: python -m build

      - name: Wheel smoke test
        run: |
          pip install --force-reinstall dist/*.whl
          python - <<'PY'
          import spherical_array_processing as sap
          from spherical_array_processing.repro import politis, rafaely, sht
          assert politis.POLITIS_SOURCE_ROOT.exists()
          assert rafaely.RAFAELY_SOURCE_ROOT.exists()
          vecs, dirs, weights = sht.getFliegeNodes(3)
          assert vecs.shape[1] == 3 and dirs.shape[1] == 2 and weights.ndim == 1
          print("wheel smoke ok")
          PY

